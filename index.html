<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seoul Pro Guide | 首爾搵食與生存神器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;700;900&display=swap');
        
        :root {
            --app-bg: #f2f2f7; /* iOS standard background */
            --naver-hover: #02b350;
        }

        body {
            font-family: 'Noto Sans HK', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--app-bg);
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 90px;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Card Interactions */
        .app-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .app-card-active:active { transform: scale(0.98); }
        
        /* Glass Header */
        .glass-header {
            background: rgba(242, 242, 247, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Sticky Section Headers for Itinerary */
        .sticky-section-header {
            position: sticky;
            top: 140px; 
            z-index: 30;
            background: rgba(242, 242, 247, 0.95);
            backdrop-filter: blur(8px);
        }

        /* Toast Animation */
        #toast {
            transition: opacity 0.3s, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(100px);
            opacity: 0;
            z-index: 100;
        }
        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* iOS Bottom Sheet */
        .bottom-sheet-overlay {
            background: rgba(0, 0, 0, 0.4);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .bottom-sheet {
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            z-index: 1001;
        }
        .bottom-sheet.open {
            transform: translateY(0);
        }
        .bottom-sheet-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        /* Custom Input styling for Boarding Pass */
        .ticket-input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            color-scheme: dark;
        }
        .ticket-input:focus { outline: none; border-color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.2); }
        .ticket-input::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>

    <!-- iOS Style Bottom Sheet for Day Assignment -->

                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;

                    if (appState.totalDays !== diffDays) {
                        appState.totalDays = diffDays;
                        Object.keys(appState.items).forEach(id => { if(appState.items[id] > appState.totalDays) appState.items[id] = 0; });

                        renderContent(); 
                        showToast(`行程已自動更新為 ${diffDays} 天`);

            }

        window.smartAssignItinerary = () => {
            const itemKeys = Object.keys(appState.items);
            const shopKeys = Object.keys(appState.shoppingItems);
            
            if(itemKeys.length === 0 && shopKeys.length === 0) {
                showToast('請先收藏想去的地點！', true);
                switchTab('explore');
                return;
            }

            const unassignedFood = itemKeys.filter(id => appState.items[id] === 0);
            const unassignedShops = shopKeys.filter(id => appState.shoppingItems[id] === 0);
            
            if(unassignedFood.length === 0 && unassignedShops.length === 0) {
                showToast('已全部分配完畢！', false);
                if (currentTab !== 'saved') switchTab('saved');
                return;
            }
            
            let currentDay = 1;
            unassignedFood.forEach(id => {
                appState.items[id] = currentDay;
                currentDay = currentDay >= appState.totalDays ? 1 : currentDay + 1;
            });
            
            unassignedShops.forEach(id => {
                appState.shoppingItems[id] = currentDay;
                currentDay = currentDay >= appState.totalDays ? 1 : currentDay + 1;
            });

            saveState();
            showToast(`成功自動分配 ${unassignedFood.length + unassignedShops.length} 個地點！`);
            switchTab('saved'); 
        };

            Object.keys(appState.items).forEach(id => { if(appState.items[id] > newDays) appState.items[id] = 0; });

        function generateItineraryText() {

                text += `📅 日期: ${appState.tripStartDate} 至 ${appState.tripEndDate} (${appState.totalDays}天)\n`;
            }
            text += "\n";
            for(let i=1; i<=appState.totalDays; i++) {
                const dayFood = db.filter(p => appState.items[p.id] === i);
                const dayShops = getAllShops().filter(p => appState.shoppingItems[p.id] === i);
                if(dayFood.length > 0 || dayShops.length > 0) {
                    text += `【 Day ${i} 】\n`;
                    if(dayFood.length > 0) {
                        text += `🍽️ 美食:\n`;
                        dayFood.forEach(p => { text += `  📍 ${p.canto} (${p.locCanto})\n     導航: https://map.naver.com/v5/search/${encodeURIComponent(p.kor)}\n`; });
                    }
                    if(dayShops.length > 0) {
                        text += `🛍️ 景點/購物:\n`;
                        dayShops.forEach(p => { text += `  🛍️ ${p.canto} (${p.locCanto})\n     導航: https://map.naver.com/v5/search/${encodeURIComponent(p.kor)}\n`; });
                    }
                    text += "\n";
                }
            }
            return text.trim();
        }

        function getCountdownBadge() {
            if (!appState.tripStartDate) return `<span class="bg-white/20 px-3 py-1 rounded-full text-xs font-bold border border-white/30">請設定日期</span>`;
            const today = new Date(); today.setHours(0,0,0,0);
            const tripDate = new Date(appState.tripStartDate);
            const diffTime = tripDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays > 0) return `<span class="bg-yellow-400 text-yellow-900 px-3 py-1 rounded-full text-xs font-black shadow-sm">倒數 ${diffDays} 天 🚀</span>`;
            if (diffDays === 0) return `<span class="bg-green-400 text-green-900 px-3 py-1 rounded-full text-xs font-black shadow-sm">今天出發 🇰🇷</span>`;
            return `<span class="bg-white/20 px-3 py-1 rounded-full text-xs font-bold border border-white/30">旅程中 🎒</span>`;
        }

            const unassignedFood = db.filter(p => appState.items[p.id] === 0);

            const unassignedShops = allShops.filter(p => appState.shoppingItems[p.id] === 0);
            
            if (unassignedFood.length > 0 || unassignedShops.length > 0) {
                html += `

                if(unassignedFood.length > 0) html += renderCards(unassignedFood, 'saved');
                if(unassignedShops.length > 0) html += renderCards(unassignedShops, 'saved');
            }

                const dayFoodItems = db.filter(p => appState.items[p.id] === i);
                const dayShopItems = allShops.filter(p => appState.shoppingItems[p.id] === i);
                
                let dateStr = "";
                if (appState.tripStartDate) {
                    const d = new Date(appState.tripStartDate);

            }

            main.innerHTML = html;
            lucide.createIcons();
        }

                                <ul class="space-y-2 text-sm text-gray-700">
                                    <li><span class="font-bold">系統機制：</span> 在期限內，首爾市內的地鐵與公車「無限次搭乘吃到飽」。</li>
                                    <li><span class="font-bold">價格參數：</span> 1日券(5,000韓元)、2日券(8,000韓元)、3日券(10,000韓元)、5日券(15,000韓元)。</li>
                                    <li><span class="font-bold text-green-600">ROI 觸發點：</span> 只要你每天搭乘地鐵/公車超過 3 次，這張卡就開始幫你賺錢。</li>
                                    <li><span class="font-bold text-red-600">致命限制 (Bug)：</span> 1. 不包含從仁川機場到市區的「機場快線 (AREX)」。 2. 如果你搭地鐵跨越了「首爾特別市」的邊界（例如去京畿道、南怡島），這張卡會失效，你必須在出站時找站務員補票。</li>
                                </ul>
                            </div>

                            <div class="mb-5">
                                <h4 class="font-black text-indigo-700 mb-2 border-l-4 border-indigo-500 pl-2">方案 B：傳統 T-money 卡</h4>
                                <ul class="space-y-2 text-sm text-gray-700">
                                    <li><span class="font-bold">系統機制：</span> 儲值型電子錢包（Pay-as-you-go）。</li>
                                    <li><span class="font-bold text-indigo-600">系統優勢：</span> 涵蓋全韓國。從仁川機場搭快線、去釜山、在便利商店買水、甚至搭計程車都能「嗶」卡付款。完全不用動腦思考邊界問題。</li>
                                </ul>
                            </div>

                            <div class="bg-blue-50 rounded-xl p-4 border border-blue-100 text-sm">
                                <div class="flex items-center text-blue-700 font-bold mb-2"><i data-lucide="cpu" class="w-4 h-4 mr-1.5"></i> 💡 系統管理員的終極建議：</div>
                                <p class="text-blue-900 leading-relaxed font-bold mb-2">「雙卡並行 (Dual-Card System)」是完美解法。</p>
                                <p class="text-blue-800 leading-relaxed">買一張傳統 T-money 卡（空卡約 3,000 KRW），儲值少量金額（約 10,000 KRW），專門用來搭乘「機場快線」與「便利商店小額支付」。<br>針對你在首爾市區瘋狂跑點吃蛋糕、逛街的那 2 到 3 天，買一張 「氣候同行卡 (3日券)」，你可以毫無顧忌地進出捷運站，坐錯站也不怕浪費錢！</p>
                            </div>
                        </div>
                    </article>

                    <!-- Hack 3: Seoul Station Navigation -->
                    <article class="app-card border border-gray-200">
                        <div class="bg-gray-900 p-4 text-white flex items-center"><i data-lucide="map" class="w-6 h-6 mr-3 text-yellow-400"></i><h3 class="font-black text-lg">模塊 2：首爾站地下迷宮脫逃與防呆導航</h3></div>
                        <div class="p-5 space-y-5 text-sm text-gray-800">
                            <p class="font-bold">當你搭乘 AREX 抵達首爾站時，大約是早上 06:45 左右。既然你住在 Raum 169 (地址：中區世宗大路 4 街 21，靠近首爾站 4 號出口與崇禮門)，你每天都會進出這個迷宮。請啟動以下**「防迷路導航邏輯」**，並把這幾條物理法則寫入大腦：</p>
                            
                            <div class="border-l-4 border-indigo-500 pl-4 py-1">
                                <h4 class="font-black text-lg mb-1 text-indigo-800">1. 垂直脫逃術 (Vertical Escape)：從地下 7 樓爬升</h4>
                                <p class="mb-1"><span class="font-bold">物理現狀：</span> AREX 的月台深埋在首爾站的地下 7 樓 (B7)。</p>
                                <p><span class="font-bold text-indigo-600">操作指令：</span> 下車後，不要跟著指標去換乘 1 號線或 4 號線。推著大行李換乘會走到崩潰。請直接尋找寫著 「出站 (Way Out) / 首爾站廣場 (Seoul Station Plaza)」 的電梯或超長手扶梯，一路垂直爬升到 地下 1 樓或地面 1 樓 的大廳。</p>
                            </div>

                            <div class="border-l-4 border-yellow-500 pl-4 py-1">
                                <h4 class="font-black text-lg mb-1 text-yellow-800">2. 鎖定「4號出口」絕對座標</h4>
                                <p class="mb-1"><span class="font-bold">操作指令：</span> 出站到寬闊的大廳後，尋找黃色指標的 「地鐵 1, 4 號線 (Subway Line 1, 4)」 方向，沿著通道走，找到 「Exit 4 (4號出口)」。</p>
                                <p class="mb-1"><span class="font-bold text-red-600">致命錯誤：</span> 不要隨便找個出口出站，打算「到地面上再導航走過去」。首爾站周邊有巨大的馬路和高架橋，地面上是無法輕易穿越的。</p>
                                <p class="mb-1"><span class="font-bold text-green-600">正確操作：</span> 在地下通道裡死死盯著黃色的「Exit 4」指標，走到完全正確的出口再爬上地面。</p>
                                <p><span class="font-bold text-gray-500">輔助提示：</span> 4 號出口有電扶梯，對推行李的人非常友善。</p>
                            </div>

                            <div class="border-l-4 border-blue-500 pl-4 py-1">
                                <h4 class="font-black text-lg mb-1 text-blue-800">法則 1：無視文字，啟動「色彩追蹤演算法 (Color-Tracking)」</h4>
                                <p class="mb-1">首爾地鐵的站內標示非常繁雜，外國人看英文會非常痛苦。</p>
                                <p><span class="font-bold text-blue-600">解法：</span> 首爾站的地板和天花板都有巨大的彩色引導線。<br>
                                • <span class="font-bold bg-[#0052A4] text-white px-1 rounded">1 號線 = 深藍色 (Dark Blue)</span><br>
                                • <span class="font-bold bg-[#00A5DE] text-white px-1 rounded">4 號線 = 淺藍色 (Light Blue)</span><br>
                                • <span class="font-bold bg-[#F37321] text-white px-1 rounded">機場快線 AREX = 橘色/青藍色 (Orange/Cyan)</span><br>
                                只要低著頭，踩著對應顏色的線走，你絕對不會迷路。</p>
                            </div>

                            <div class="border-l-4 border-gray-400 pl-4 py-1">
                                <h4 class="font-black text-lg mb-1 text-gray-800">法則 3：換乘距離極度漫長 (The Transfer Distance Buffer)</h4>
                                <p class="mb-1">在首爾站，從 1 號線換乘到 4 號線，或是從地鐵換乘到機場快線，通常需要步行 5 到 10 分鐘（包含爬樓梯與極長的手扶梯）。</p>
                                <p><span class="font-bold">邏輯提示：</span> 在計算行程時間時，請務必把這「10分鐘的站內步行時間」加入你的運算變數中，不要把時間抓得太死。</p>
                            </div>

                            <div class="border-l-4 border-emerald-500 pl-4 py-1 bg-emerald-50 rounded-r-xl">
                                <h4 class="font-black text-lg mb-2 text-emerald-800 pt-2">3. 地面最後衝刺 (Surface Navigation to Raum 169)</h4>
                                <p class="mb-2 font-bold text-emerald-900">從 4 號出口上來後，請完全按照這條直線邏輯走（約 4-5 分鐘）：</p>
                                <ul class="space-y-1.5">
                                    <li><span class="font-bold">步驟 A：</span> 一出 4 號出口，面對大馬路 (世宗大路 Sejong-daero)，向右轉 (往北走)。你會看到遠方巨大的傳統城門「崇禮門 (南大門)」。</li>
                                    <li><span class="font-bold">步驟 B：</span> 沿著這條寬闊的馬路直走約 250 公尺，你會經過一棟巨大的現代玻璃帷幕大樓 (Grand Central)。</li>
                                    <li><span class="font-bold">步驟 C：</span> 經過大樓後，注意右手邊的第一或第二條小巷子，那條就是 「世宗大路 4 街 (Sejong-daero 4-gil)」。</li>
                                    <li><span class="font-bold text-emerald-700">步驟 D：</span> 右轉轉進巷子裡，Raum 169 飯店就在你的眼前！</li>
                                </ul>
                                <div class="pb-2"></div>
                            </div>

                        </div>
                    </article>
                </div>`;
                lucide.createIcons();
            }

            adjustMainPadding();
        }

        window.switchTab = (tab) => {
            currentTab = tab;
            ['home', 'explore', 'shopping', 'areas', 'hacks', 'saved'].forEach(t => {
                const btn = document.getElementById(`nav-${t}`);
                if(btn) {
                    btn.classList.toggle('text-blue-600', tab === t);
                    btn.classList.toggle('text-gray-400', tab !== t);
                }
            });

            const titles = {
                home: { t: "首爾行前準備 📝", s: "Trip Dashboard" },
                explore: { t: "首爾搵食指南 🇰🇷", s: "Explore Seoul" },
                shopping: { t: "血拼地圖 🛍️", s: "Seoul Shopping Guide" },
                areas: { t: "分區尋找 🗺️", s: "Browse by Area" },
                hacks: { t: "首爾生存手冊 📖", s: "Seoul Pro Hacks" },
                saved: { t: "行程規劃 🎒", s: "Itinerary Planner" }
            };
            document.getElementById('headerTitle').innerText = titles[tab].t;
            document.getElementById('headerSub').innerText = titles[tab].s;

            const headerRight = document.getElementById('headerRight');
            headerRight.innerHTML = `<span class="text-xs font-bold text-gray-400" id="headerCount">Total ${db.length} Places</span>`;

            if(tab === 'explore') renderFilters();
            if(tab === 'shopping') renderShoppingFilters();
            if(tab !== 'areas') activeArea = null; 
            
            renderContent();
            window.scrollTo(0,0);
        };

        // Init
        document.getElementById('searchInput').addEventListener('input', renderContent);
        updateSavedBadge();
        switchTab('home');
    </script>
</body>
</html>
